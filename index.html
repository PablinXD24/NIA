<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIX - NIA System</title>
    <style>
        /* ESTÉTICA LIQUID GLASS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        .smart-container { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 24px; 
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.08); 
            width: 100%; 
            max-width: 700px; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .prompt-area { padding: 24px; display: flex; flex-direction: column; gap: 16px; background: rgba(255, 255, 255, 0.3); }
        .header-title { font-size: 14px; font-weight: 600; color: #596a7b; display: flex; justify-content: space-between; align-items: center; }
        
        .ai-badge { 
            font-size: 12px; 
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        textarea { width: 100%; background: transparent; border: none; resize: none; font-size: 18px; line-height: 1.5; color: #2c3e50; outline: none; min-height: 60px; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; }
        .status-text { font-size: 13px; color: #3498db; font-weight: 500; opacity: 0; display: flex; align-items: center; gap: 8px; }
        
        .btn-submit { background: #2c3e50; color: white; border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.1); background: #000; }

        .results-area { max-height: 0; opacity: 0; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); background: rgba(255, 255, 255, 0.85); border-top: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
        .expanded .results-area { max-height: 1000px; opacity: 1; padding: 32px 24px; }

        .result-block { margin-bottom: 24px; }
        .result-title { font-size: 12px; font-weight: 700; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .script-box { background: white; border: 1px solid #dcdde1; padding: 16px; border-radius: 12px; position: relative; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        
        .btn-copy { position: absolute; top: 12px; right: 12px; background: #f1f2f6; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .spinner { width: 16px; height: 16px; border: 2px solid #3498db; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="smart-container" id="mainContainer">
        <div class="prompt-area">
            <div class="header-title">
                <span>Insira seu prompt de análise de clientes</span>
                <span class="ai-badge">✦ NIA System</span>
            </div>
            
            <textarea id="promptInput" placeholder="Ex: Analise a situação de Pablo Soares..."></textarea>
            
            <div class="action-bar">
                <div class="status-text" id="statusText">
                    <div class="spinner"></div> NIA processando dados...
                </div>
                
                <button id="btnSubmit" class="btn-submit">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="results-area">
            <div class="result-block">
                <div class="result-title">⚡ Diagnóstico da NIA</div>
                <div id="iaDiagnostico" style="color: #2c3e50; font-size: 16px; line-height: 1.4;"></div>
            </div>

            <div class="result-block">
                <div class="result-title">✍️ Script Sugerido</div>
                <div class="script-box">
                    <button id="btnCopiar" class="btn-copy">Copiar</button>
                    <div id="iaScript" style="white-space: pre-wrap; color: #34495e; font-size: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZoZMwAzYpban5PnkeHIQhz3Si4sTJm9E",
            authDomain: "nova-96b06.firebaseapp.com",
            projectId: "nova-96b06",
            appId: "1:166967553772:web:475370390f719953afbfc9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- BANCO DE DADOS LOCAL ---
        const CLIENTE = [
            { nome: "Pablo Soares", cargo: "Desenvolvedor", empresa: "ENIAC", contato: "pablo@email.com" },
            { nome: "Ana Costa", cargo: "Gerente", empresa: "J&J Projects", contato: "ana.c@empresa.com" }
        ];

        const SITUACAO = [
            { id: "atraso", diag: "Pagamento pendente identificado no sistema.", script: "Olá, [NOME]! Notamos que o boleto da [EMPRESA] está em aberto. Como podemos ajudar na regularização?" },
            { id: "acordo", diag: "Solicitação de parcelamento recebida.", script: "Oi [NOME], verificamos seu pedido de acordo para a [EMPRESA]. Seguem as opções de parcelamento." }
        ];

        const mainContainer = document.getElementById('mainContainer');
        const promptInput = document.getElementById('promptInput');
        const btnSubmit = document.getElementById('btnSubmit');
        const statusText = document.getElementById('statusText');
        const iaDiagnostico = document.getElementById('iaDiagnostico');
        const iaScript = document.getElementById('iaScript');

        btnSubmit.addEventListener('click', async () => {
            const input = promptInput.value.toLowerCase().trim();
            if (!input) return;

            btnSubmit.disabled = true;
            statusText.style.opacity = "1";
            mainContainer.classList.remove('expanded');

            setTimeout(async () => {
                // Lógica de busca NIA
                const cliente = CLIENTE.find(c => input.includes(c.nome.toLowerCase()));
                const situacao = SITUACAO.find(s => input.includes(s.id));

                let resultadoDiag = "";
                let resultadoScript = "";

                if (cliente) {
                    resultadoDiag = `**DADOS DO CLIENTE:** ${cliente.nome} (${cliente.empresa})\n`;
                    resultadoDiag += situacao ? `**STATUS:** ${situacao.diag}` : "**STATUS:** Nenhuma situação específica detectada.";
                    
                    // Personaliza o script com os dados do cliente
                    resultadoScript = situacao ? 
                        situacao.script.replace("[NOME]", cliente.nome).replace("[EMPRESA]", cliente.empresa) : 
                        `Olá ${cliente.nome}, estamos analisando sua conta na ${cliente.empresa}. Em breve daremos um retorno.`;
                } else {
                    resultadoDiag = "Nenhum cliente correspondente encontrado no banco de dados.";
                    resultadoScript = "Por favor, verifique se o nome do cliente está correto.";
                }

                iaDiagnostico.innerText = resultadoDiag;
                iaScript.innerText = resultadoScript;
                mainContainer.classList.add('expanded');

                // Gravação no Firebase
                try {
                    await setDoc(doc(db, "nia_logs", `id_${Date.now()}`), {
                        input_user: input,
                        diagnostico: resultadoDiag,
                        data: serverTimestamp()
                    });
                } catch (e) { console.error("Erro Firebase:", e); }

                statusText.style.opacity = "0";
                btnSubmit.disabled = false;
            }, 700);
        });

        document.getElementById('btnCopiar').addEventListener('click', () => {
            navigator.clipboard.writeText(iaScript.innerText);
            const b = document.getElementById('btnCopiar');
            b.innerText = "Copiado!";
            setTimeout(() => b.innerText = "Copiar", 2000);
        });
    </script>
</body>
</html>
