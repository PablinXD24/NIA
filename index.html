<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIX - Consulta de Dados</title>
    <style>
        /* ESTÉTICA LIQUID GLASS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        .smart-container { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 24px; 
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.08); 
            width: 100%; 
            max-width: 700px; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.5s ease; 
            overflow: hidden; 
        }

        .prompt-area { padding: 24px; display: flex; flex-direction: column; gap: 16px; background: rgba(255, 255, 255, 0.3); }
        .header-title { font-size: 14px; font-weight: 600; color: #596a7b; display: flex; justify-content: space-between; align-items: center; }
        
        textarea { width: 100%; background: transparent; border: none; resize: none; font-size: 18px; line-height: 1.5; color: #2c3e50; outline: none; min-height: 60px; }
        
        .action-bar { display: flex; justify-content: flex-end; align-items: center; }
        
        .btn-submit { background: #2c3e50; color: white; border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; }

        .results-area { max-height: 0; opacity: 0; transition: all 0.5s ease; background: rgba(255, 255, 255, 0.85); overflow: hidden; }
        .smart-container.expanded .results-area { max-height: 1000px; opacity: 1; padding: 32px 24px; }

        .result-block { margin-bottom: 24px; padding: 15px; border-radius: 12px; background: white; border: 1px solid rgba(0,0,0,0.05); }
        .result-title { font-size: 12px; font-weight: 700; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 15px; color: #2c3e50; }
        .data-label { font-weight: 600; color: #596a7b; }
        
        .not-found { color: #e74c3c; font-weight: 600; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="smart-container" id="mainContainer">
        <div class="prompt-area">
            <div class="header-title">
                <span>Consulta de Base de Dados Local</span>
                <span style="font-weight: 700; color: #2c3e50;">THE SIX</span>
            </div>
            
            <textarea id="promptInput" placeholder="Digite o nome do cliente para buscar..."></textarea>
            
            <div class="action-bar">
                <button id="btnSubmit" class="btn-submit">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="results-area" id="resultsArea">
            </div>
    </div>

    <script type="module">
        const mainContainer = document.getElementById('mainContainer');
        const promptInput = document.getElementById('promptInput');
        const btnSubmit = document.getElementById('btnSubmit');
        const resultsArea = document.getElementById('resultsArea');

        // Função Principal de Busca
        async function buscarDados() {
            const termoBusca = promptInput.value.trim().toLowerCase();
            if (!termoBusca) return;

            try {
                // Puxando dados dos arquivos JSON no repositório
                const [resClientes, resSituacao] = await Promise.all([
                    fetch('./clientes.json'),
                    fetch('./situacao.json')
                ]);

                if (!resClientes.ok || !resSituacao.ok) throw new Error("Erro ao carregar arquivos JSON");

                const clientes = await resClientes.json();
                const situacoes = await resSituacao.json();

                // Filtrando por nome
                const cliente = clientes.find(c => termoBusca.includes(c.nome.toLowerCase()) || c.nome.toLowerCase().includes(termoBusca));
                const status = situacoes.find(s => termoBusca.includes(s.nome.toLowerCase()) || s.nome.toLowerCase().includes(termoBusca));

                exibirResultados(cliente, status);
                mainContainer.classList.add('expanded');

            } catch (error) {
                console.error(error);
                resultsArea.innerHTML = `<div class="not-found">Erro: Certifique-se que os arquivos .json estão no mesmo repositório.</div>`;
                mainContainer.classList.add('expanded');
            }
        }

        // Função para construir o HTML dos resultados
        function exibirResultados(cliente, status) {
            if (!cliente && !status) {
                resultsArea.innerHTML = `<div class="not-found">Nenhum dado encontrado para este termo.</div>`;
                return;
            }

            let html = "";

            if (cliente) {
                html += `
                <div class="result-block">
                    <div class="result-title">👤 Informações Pessoais</div>
                    <div class="data-row"><span class="data-label">Nome:</span> <span>${cliente.nome}</span></div>
                    <div class="data-row"><span class="data-label">CPF:</span> <span>${cliente.cpf}</span></div>
                    <div class="data-row"><span class="data-label">Renda:</span> <span>R$ ${cliente.renda}</span></div>
                    <div class="data-row"><span class="data-label">Estado Civil:</span> <span>${cliente.estado_civil}</span></div>
                </div>`;
            }

            if (status) {
                html += `
                <div class="result-block">
                    <div class="result-title">📊 Situação Financeira</div>
                    <div class="data-row"><span class="data-label">Status:</span> <span>${status.status_divida}</span></div>
                    <div class="data-row"><span class="data-label">Dívida Pendente:</span> <span style="color: #e74c3c">R$ ${status.valor_pendente}</span></div>
                    <div class="data-row"><span class="data-label">Score:</span> <span>${status.score_credito}</span></div>
                    <div class="data-row"><span class="data-label">Limite Disponível:</span> <span>R$ ${status.limite_disponivel}</span></div>
                </div>`;
            }

            resultsArea.innerHTML = html;
        }

        // Eventos
        btnSubmit.addEventListener('click', buscarDados);
        
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                buscarDados();
            }
        });
    </script>
</body>
</html>
