<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIX - Assistente B2B AI</title>
    <style>
        /* MANTIDA ESTÉTICA ORIGINAL (LIQUID GLASS) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 100; }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; padding: 12px 24px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s; }
        .smart-container { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 24px; box-shadow: 0 12px 40px rgba(31, 38, 135, 0.08); width: 100%; max-width: 700px; transition: all 0.5s; overflow: hidden; display: none; flex-direction: column; }
        .smart-container.expanded .results-area { max-height: 2000px; opacity: 1; padding: 32px 24px; }
        .prompt-area { padding: 24px; display: flex; flex-direction: column; gap: 16px; background: rgba(255, 255, 255, 0.3); }
        .header-title { font-size: 14px; font-weight: 600; color: #596a7b; display: flex; justify-content: space-between; }
        .ai-badge { font-size: 12px; background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        textarea { width: 100%; background: transparent; border: none; resize: none; font-size: 18px; color: #2c3e50; outline: none; min-height: 60px; }
        .status-text { font-size: 13px; color: #3498db; opacity: 0; transition: opacity 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-submit { background: #2c3e50; color: white; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .results-area { max-height: 0; opacity: 0; transition: all 0.6s; background: rgba(255, 255, 255, 0.85); overflow: hidden; }
        .script-box { background: rgba(255, 255, 255, 0.9); border: 1px solid #dcdde1; padding: 16px; border-radius: 12px; position: relative; }
        .spinner { width: 16px; height: 16px; border: 2px solid #3498db; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #2c3e50;">THE SIX AI</h1>
        <button class="btn-google" id="btnGoogle">Entrar com Google</button>
    </div>

    <div class="smart-container" id="mainContainer">
        <div class="prompt-area">
            <div class="header-title">
                <span id="userGreeting">Como posso ajudar na cobrança?</span>
                <span class="ai-badge">✦ Gemini Free Logic</span>
            </div>
            <textarea id="promptInput" placeholder="Descreva a situação..."></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="status-text" id="statusText"><div class="spinner"></div> Processando...</div>
                <button id="btnSubmit" class="btn-submit">➔</button>
            </div>
        </div>
        <div class="results-area" id="resultsArea">
            <div style="margin-bottom: 24px;">
                <div style="font-size: 12px; font-weight: 700; color: #7f8c8d; text-transform: uppercase;">⚡ Diagnóstico</div>
                <div id="iaDiagnostico"></div>
            </div>
            <div>
                <div style="font-size: 12px; font-weight: 700; color: #7f8c8d; text-transform: uppercase;">✍️ Script</div>
                <div class="script-box">
                    <div id="iaScript" style="white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const firebaseConfig = {
            apiKey: "AIzaSyBZoZMwAzYpban5PnkeHIQhz3Si4sTJm9E",
            authDomain: "nova-96b06.firebaseapp.com",
            projectId: "nova-96b06",
            appId: "1:166967553772:web:475370390f719953afbfc9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // CHAVE CORRIGIDA COM O 'b' MINÚSCULO CONFORME SEU CURL
        const API_KEY = "AIzaSyBZ9RUelTbaNV5FEclRYu8xshHJpJCbWFc";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
                document.getElementById('userGreeting').innerText = `Olá, ${user.displayName.split(' ')[0]}!`;
            }
        });

        document.getElementById('btnGoogle').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));

        document.getElementById('btnSubmit').addEventListener('click', async () => {
            const promptValue = document.getElementById('promptInput').value.trim();
            if (!promptValue) return;

            document.getElementById('statusText').style.opacity = "1";
            try {
                const result = await model.generateContent("Você é um especialista em cobrança B2B. Analise e crie um script para: " + promptValue + ". Separe o diagnóstico do script por '---'");
                const response = await result.response;
                const text = response.text();

                const [diag, script] = text.split('---');
                document.getElementById('iaDiagnostico').innerText = diag.trim();
                document.getElementById('iaScript').innerText = script ? script.trim() : text;
                document.getElementById('mainContainer').classList.add('expanded');
            } catch (error) {
                console.error(error);
                alert("Erro na chave de API. Verifique se ela está ativa no Google AI Studio.");
            } finally {
                document.getElementById('statusText').style.opacity = "0";
            }
        });
    </script>
</body>
</html>
